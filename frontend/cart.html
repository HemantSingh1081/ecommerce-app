<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - ShopHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🛍️ ShopHub</a>
            <div class="nav-icons">
                <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="cart.html"><i class="fas fa-shopping-bag"></i><span>Cart (<span id="cartCount">0</span>)</span></a>
                <div id="authSection">
                    <a href="login.html"><i class="fas fa-user"></i><span>Login</span></a>
                </div>
                <div id="userSection" style="display:none">
                    <span id="userNameDisplay"></span>
                    <button onclick="logoutUser()" class="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="cart-container">
        <h1>Shopping Cart</h1>
        <div id="cartContent">Loading...</div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
